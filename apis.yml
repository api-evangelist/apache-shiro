aid: apache-shiro
name: Apache Shiro
description: >-
  Apache Shiro is a powerful and easy-to-use Java security framework that performs authentication, authorization, cryptography, and session management. It provides a clean API for securing applications
  from the smallest mobile applications to the largest enterprise systems.
