naftiko: 1.0.0-alpha2
info:
  label: Apache Shiro REST API — Authentication
  description: 'Apache Shiro REST API — Authentication. 3 operations. Lead operation: Apache Shiro Login. Self-contained Naftiko
    capability covering one Apache Shiro business surface.'
  tags:
  - Apache Shiro
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APACHE_SHIRO_API_KEY: APACHE_SHIRO_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-authentication
    baseUri: https://app.example.com/api
    description: Apache Shiro REST API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: auth-login
      path: /auth/login
      operations:
      - name: login
        method: POST
        description: Apache Shiro Login
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: auth-logout
      path: /auth/logout
      operations:
      - name: logout
        method: POST
        description: Apache Shiro Logout
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: auth-token
      path: /auth/token
      operations:
      - name: generatetoken
        method: POST
        description: Apache Shiro Generate Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: rest-authentication-rest
    port: 8080
    description: REST adapter for Apache Shiro REST API — Authentication. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/auth/login
      name: auth-login
      description: REST surface for auth-login.
      operations:
      - method: POST
        name: login
        description: Apache Shiro Login
        call: rest-authentication.login
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/auth/logout
      name: auth-logout
      description: REST surface for auth-logout.
      operations:
      - method: POST
        name: logout
        description: Apache Shiro Logout
        call: rest-authentication.logout
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/auth/token
      name: auth-token
      description: REST surface for auth-token.
      operations:
      - method: POST
        name: generatetoken
        description: Apache Shiro Generate Token
        call: rest-authentication.generatetoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apache Shiro REST API — Authentication. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: apache-shiro-login
      description: Apache Shiro Login
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-authentication.login
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apache-shiro-logout
      description: Apache Shiro Logout
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-authentication.logout
      outputParameters:
      - type: object
        mapping: $.
    - name: apache-shiro-generate-token
      description: Apache Shiro Generate Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-authentication.generatetoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
