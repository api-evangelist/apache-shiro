naftiko: 1.0.0-alpha2
info:
  label: Apache Shiro REST API — Users
  description: 'Apache Shiro REST API — Users. 2 operations. Lead operation: Apache Shiro List Users. Self-contained Naftiko
    capability covering one Apache Shiro business surface.'
  tags:
  - Apache Shiro
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APACHE_SHIRO_API_KEY: APACHE_SHIRO_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-users
    baseUri: https://app.example.com/api
    description: Apache Shiro REST API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: listusers
        method: GET
        description: Apache Shiro List Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createuser
        method: POST
        description: Apache Shiro Create User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: rest-users-rest
    port: 8080
    description: REST adapter for Apache Shiro REST API — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: listusers
        description: Apache Shiro List Users
        call: rest-users.listusers
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createuser
        description: Apache Shiro Create User
        call: rest-users.createuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apache Shiro REST API — Users. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: apache-shiro-list-users
      description: Apache Shiro List Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-users.listusers
      outputParameters:
      - type: object
        mapping: $.
    - name: apache-shiro-create-user
      description: Apache Shiro Create User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-users.createuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
